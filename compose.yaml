services:
  postgres_db:
    image: postgres:latest
    container_name: jdr_db
    environment:
      POSTGRES_DB: jdr_project
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d jdr_project"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: jdr_server_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_db:5432/jdr_project
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres_db:
        condition: service_healthy